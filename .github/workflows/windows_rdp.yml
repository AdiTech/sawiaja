name: Windows-11-Ultimate-Pro-RDP
on:
  workflow_dispatch:
    inputs:
      auth_code:
        description: 'Google Auth Code'
        required: true
      pin:
        description: '6 Digit PIN'
        required: true
        default: '123456'
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: System Preparation
      run: |
        Set-ExecutionPolicy Bypass -Scope Process -Force
        [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
    - name: Apt Command Alias
      run: |
        Set-Alias -Name apt -Value choco
    - name: Download Remote Desktop Host
      run: |
        $url = "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi"
        $outpath = "C:\chromeremotedesktophost.msi"
        Invoke-WebRequest -Uri $url -OutFile $outpath
    - name: Install Remote Desktop Host
      run: |
        Start-Process msiexec.exe -Wait -ArgumentList "/i C:\chromeremotedesktophost.msi /quiet"
    - name: Initialize Connection
      run: |
        ${{ github.event.inputs.auth_code }} --pin=${{ github.event.inputs.pin }}
    - name: Optimize Power Settings
      run: |
        powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
        powercfg /hibernate off
    - name: Core Git
      run: choco install git -y
    - name: Core Python
