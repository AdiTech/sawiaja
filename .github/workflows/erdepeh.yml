name: Ubuntu-Linux-RDP-Pro
on:
  workflow_dispatch:
    inputs:
      auth_command:
        description: 'Paste Google Auth Command (DISPLAY=...)'
        required: true
      pin:
        description: '6 Digit PIN'
        required: true
        default: '123456'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Update System Packages
      run: |
        sudo apt update
    - name: Install Python Environment
      run: |
        sudo apt install -y python3 python3-pip python3-venv
    - name: Install Nodejs Environment
      run: |
        curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
        sudo apt install -y nodejs
    - name: Install Desktop Environment
      run: |
        sudo apt install -y xfce4 desktop-base xfce4-terminal
    - name: Install Chrome Remote Desktop
      run: |
        wget https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb
        sudo apt install -y ./chrome-remote-desktop_current_amd64.deb
    - name: Install Supporting Tools
      run: |
        sudo apt install -y firefox-geckodriver wget curl git zip unzip
    - name: Configure XFCE Session
      run: |
        sudo bash -c 'echo "exec /etc/X11/XSRV/Xsession /usr/bin/xfce4-session" > /etc/chrome-remote-desktop-session'
    - name: Initialize Google Connection
      run: |
        ${{ github.event.inputs.auth_command }} --pin=${{ github.event.inputs.pin }}
    - name: Verification Step
      run: |
        python3 --version
        node --version
        npm --version
    - name: Keep Alive System
      run: |
        sleep 21600
